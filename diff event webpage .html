<!DOCTYPE html>
<html>
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h1>Hello World!</h1>




<script>
$("h1").on({

click(){$(this).hide()},
mouseenter(){$(this).css("background","yellow")},
mousedown(){$(this).css("background","red")}

});
</script>



</body>
</html>
